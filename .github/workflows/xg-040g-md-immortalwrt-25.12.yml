name: Build_XG_040G_MD_ImmortalWrt_25_12

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: "immortalwrt.config"
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-25.12
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  CCACHE_DIR: /mnt/immortalwrt/ccache
  CCACHE_MAXSIZE: 5G
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            mkbootimg device-tree-compiler ccache cpio perl
          sudo timedatectl set-timezone "$TZ" 2>/dev/null || true

      - name: Clone ImmortalWrt
        run: git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Extract device config (if any)
        run: |
          if [ -f "XG-040G-MD.tar.gz" ]; then
            tar -xzf XG-040G-MD.tar.gz -C openwrt/
          fi

      - name: Setup build directories
        run: |
          sudo mkdir -p /mnt/immortalwrt/{dl,staging_dir,build_dir,ccache}
          sudo chown -R $USER:$USER /mnt/immortalwrt
          cd openwrt
          ln -sfn /mnt/immortalwrt/dl dl
          ln -sfn /mnt/immortalwrt/staging_dir staging_dir
          ln -sfn /mnt/immortalwrt/build_dir build_dir

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: /mnt/immortalwrt/dl
          key: ${{ runner.os }}-dl-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: ${{ runner.os }}-dl-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /mnt/immortalwrt/ccache
          key: ${{ runner.os }}-ccache-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-ccache-

      - name: Setup ccache
        run: |
          ccache -M ${{ env.CCACHE_MAXSIZE }}
          ccache -z

      - name: Update feeds
        working-directory: ./openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Clean old kernel patch leftovers
        working-directory: ./openwrt
        run: |
          find target/linux -name "fmsh.c" -delete
          rm -f target/linux/generic/hack-6.12/*fmsh*.patch

      - name: Apply base FMSH driver (0401)
        working-directory: ./openwrt
        run: |
          PATCH_DIR="target/linux/generic/hack-6.12"
          mkdir -p "$PATCH_DIR"
          if [ -f "../patches/0401-mtd-spinand-Add-FudanMicro-FM25G02B-base.patch" ]; then
            cp "../patches/0401-mtd-spinand-Add-FudanMicro-FM25G02B-base.patch" "$PATCH_DIR/"
            echo "✅ Base FMSH driver patch added"
          else
            echo "❌ Base patch not found"
            exit 1
          fi

      - name: Manually add ECC fix for FM25G02B
        working-directory: ./openwrt
        run: |
          FMSH_C="target/linux/generic/hack-6.12/fmsh.c"
          if [ -f "$FMSH_C" ]; then
            if ! grep -q "fm25g02b_ecc_get_status" "$FMSH_C"; then
              sed -i '/static const struct mtd_ooblayout_ops fm25g02b_ooblayout = {/,/^}/a\
\
/* FM25G02B ECC status decoder */\
static int fm25g02b_ecc_get_status(struct spinand_device *spinand, u8 status)\
{\
    struct nand_device *nand = spinand_to_nand(spinand);\
    u8 eccsr = (status >> 4) & 0x7;\
    switch (eccsr) {\
    case 0x0: return 0;\
    case 0x1: case 0x2: case 0x3: return 0;\
    case 0x4: return nand->eccreq.strength;\
    case 0x7: return -EBADMSG;\
    default: return -EBADMSG;\
    }\
}' "$FMSH_C"
              sed -i 's/SPINAND_ECCINFO(&fm25g02b_ooblayout, NULL)/SPINAND_ECCINFO(&fm25g02b_ooblayout, fm25g02b_ecc_get_status)/' "$FMSH_C"
              echo "✅ Manually added ECC fix for FM25G02B"
            else
              echo "ECC fix already present"
            fi
          else
            echo "fmsh.c not found, cannot add ECC fix"
            exit 1
          fi

      - name: Apply configuration
        run: |
          cp -f ${{ env.CONFIG_FILE }} openwrt/.config
          cd openwrt && make defconfig

      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j$(nproc)
          find dl -size -1024c -delete 2>/dev/null || true

      - name: Compile firmware
        id: compile
        working-directory: ./openwrt
        run: |
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s
          else
            make -j$(nproc)
          fi
          
          DEVICE_NAME=$(grep 'CONFIG_TARGET.*DEVICE_.*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          echo "DEVICE_NAME=${DEVICE_NAME:+_$DEVICE_NAME}" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          
          FIRMWARE_DIR=$(find bin/targets -name "*-sysupgrade.*" -o -name "*-factory.*" | head -1 | xargs dirname 2>/dev/null)
          if [ -z "$FIRMWARE_DIR" ]; then
            echo "❌ No firmware files found!"
            exit 1
          fi
          echo "FIRMWARE_DIR=$FIRMWARE_DIR" >> $GITHUB_ENV

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: ImmortalWrt_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
          path: openwrt/${{ env.FIRMWARE_DIR }}/*

      - name: Create Release
        if: env.UPLOAD_RELEASE == 'true'
        id: create_release
        run: |
          TAG="build-$(date +'%Y%m%d-%H%M%S')-${GITHUB_RUN_ID}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          cat > release.md << EOF
          # ImmortalWrt for XG-040G-MD with FM25G02B ECC fix
          
          - **分支**: ${{ env.REPO_BRANCH }}
          - **时间**: $(date '+%Y-%m-%d %H:%M:%S')
          - **配置**: ${{ env.CONFIG_FILE }}
          EOF

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag_name: ${{ env.TAG }}
          body_path: release.md
          files: openwrt/${{ env.FIRMWARE_DIR }}/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          retain_days: 7
          keep_minimum_runs: 5
