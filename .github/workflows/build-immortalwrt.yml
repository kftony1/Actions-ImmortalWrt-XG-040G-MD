#
# Nokia Bell XG-040G-MD 专用云编译配置（复旦微闪存版）
# 基于 P3TERX/Actions-OpenWrt 模板
# 内核版本: 6.12.74 | 源码分支: openwrt-25.12
# 支持: NPU驱动 | 超频 | IPv6 | USB网络共享
# 闪存修复: 复旦微 FM25G02BI3 (禁用 AFE)
#

name: Build ImmortalWrt for XG-040G-MD

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH 连接 Actions（调试用）'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: 0 20 * * 0

env:
  # ========== 核心配置 ==========
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: immortalwrt.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  
  # ========== 上传配置 ==========
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出代码
      uses: actions/checkout@main

    # ---------- 环境初始化 ----------
    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ec2 fastjar flex gawk gettext \
          gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool libc6-dev-i386 \
          libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
          libncursesw5 libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm \
          lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 \
          python3-pip python3-ply python3-pyelftools qemu-utils re2c rsync scons squashfs-tools \
          subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo apt autoremove --purge -y
        sudo apt clean
        sudo timedatectl set-timezone "$TZ"

    # ---------- 克隆源码 ----------
    - name: 克隆 ImmortalWrt 源码
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt 2>/dev/null || true
        # 创建软链接的备用方案
        if [ ! -L "$GITHUB_WORKSPACE/openwrt" ]; then
          ln -sf $(pwd)/openwrt $GITHUB_WORKSPACE/openwrt
        fi

    # ---------- 复旦微闪存修复（关键！）----------
    - name: 复旦微闪存修复 (FM25G02BI3)
      run: |
        DTS_FILE="openwrt/target/linux/airoha/dts/an7581-bell_xg-040g-md.dts"
        
        echo "=========================================="
        echo "复旦微闪存修复 (FM25G02BI3)"
        echo "=========================================="
        
        if [ ! -f "$DTS_FILE" ]; then
          echo "❌ 错误: 找不到设备树文件"
          echo "尝试查找..."
          find openwrt -name "*xg-040g-md*" 2>/dev/null
          exit 1
        fi
        
        echo "✅ 找到设备树文件: $DTS_FILE"
        
        # 检查是否已存在禁用 AFE 的配置
        if grep -q "status.*disabled.*afe" "$DTS_FILE" || grep -q "&afe.*disabled" "$DTS_FILE"; then
          echo "✅ AFE 已禁用，无需修改"
        else
          echo "📝 正在添加 AFE 禁用配置..."
          
          # 在文件末尾添加禁用 AFE 的配置
          cat >> "$DTS_FILE" << 'EOF'

/* 复旦微闪存修复：禁用 AFE (Analog Front End) */
/* 解决 FM25G02BI3 闪存兼容性问题 */
&afe {
    status = "disabled";
};
EOF
          echo "✅ 已添加复旦微闪存修复"
        fi
        
        echo ""
        echo "=== 验证修改 ==="
        tail -15 "$DTS_FILE"

    # ---------- 自定义 feeds ----------
    - name: 加载自定义 feeds
      run: |
        [ -e feeds.conf.default ] && cp feeds.conf.default openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    # ---------- 加载固件配置 ----------
    - name: 加载自定义配置
      run: |
        [ -e files ] && cp -r files openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    # ---------- SSH 调试 ----------
    - name: SSH 连接 Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    # ---------- 下载软件包 ----------
    - name: 下载软件包
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    # ---------- 编译固件 ----------
    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) 线程编译"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    # ---------- 整理固件 ----------
    - name: 整理固件文件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/airoha/an7581
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件目录（Artifact）
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: XG-040G-MD_FudanMicro_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    # ---------- 创建 Release ----------
    - name: 生成 Release Tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=XG-040G-MD-复旦微-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        cat > release.txt << 'EOF'
## XG-040G-MD 固件说明（复旦微闪存版）

### ⚠️ 特别注意
- 本固件专为**复旦微 FM25G02BI3 闪存**适配
- 已禁用 AFE (Analog Front End) 解决闪存兼容性问题

### 固件特性
- 源码分支: openwrt-25.12
- 内核版本: 6.12.74
- NPU 驱动: 已启用
- 超频支持: 需通过 SoC 插件设置
- IPv6: 完全支持
- USB 网络共享: 已支持

### 刷机提示
刷机后第一次启动可能需要 3-5 分钟，请耐心等待
EOF
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到 Release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    # ---------- 清理旧 Releases ----------
    - name: 删除旧 Releases
      uses: dev-drprasad/delete-older-releases@v0.2.1
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
