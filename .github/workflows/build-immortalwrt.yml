name: Build immortalwrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: 0 8 * * 1

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:      
      contents: write 

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        dpkg-query -Wf '${Installed-Size}\t${Package}\n' | sort -n | tail -n 100
        df -h
        echo "Removing large packages"
        sudo apt-get remove -y '^dotnet-.*'
        sudo apt-get remove -y '^llvm-.*'
        sudo apt-get remove -y 'php.*'
        sudo apt-get remove -y '^mongodb-.*'
        sudo apt-get remove -y '^mysql-.*'
        sudo apt-get remove -y azure-cli google-cloud-sdk google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri
        sudo apt-get autoremove -y
        sudo apt-get clean
        df -h
        echo "Removing large directories"
        sudo rm -rf /usr/share/dotnet/
        sudo rm -rf /usr/local/graalvm/
        sudo rm -rf /usr/local/.ghcup/
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/local/lib/node_modules
        df -h
        sudo -E apt-get -qq update
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp \
          nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip python3-ply \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig \
          texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        tar zxvf $GITHUB_WORKSPACE/XG-040G-MD.tar.gz -C /workdir/openwrt

    - name: Enable build ccache
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: 'immortalwrt-xg040gmd-612'
        prefix: ${{ github.workspace }}/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Write FM25G02B driver directly
      run: |
        cd openwrt
        echo "=========================================="
        echo "直接写入 fmsh.c 驱动"
        echo "=========================================="
        
        # 创建目录
        mkdir -p drivers/mtd/nand/spi
        
        # 写入 fmsh.c
        cat > drivers/mtd/nand/spi/fmsh.c << 'EOF'
        // SPDX-License-Identifier: GPL-2.0
        /*
         * Copyright (c) 2021 Rockchip Electronics Co., Ltd.
         */
        
        #include <linux/device.h>
        #include <linux/kernel.h>
        #include <linux/mtd/spinand.h>
        
        #define SPINAND_MFR_FMSH           0x46  /* 'F' */
        
        static SPINAND_OP_VARIANTS(read_cache_variants,
                SPINAND_PAGE_READ_FROM_CACHE_X4_OP(0, 1, 0, NULL, 0),
                SPINAND_PAGE_READ_FROM_CACHE_X2_OP(0, 1, 0, NULL, 0),
                SPINAND_PAGE_READ_FROM_CACHE_OP(true, 0, 1, 0, NULL, 0),
                SPINAND_PAGE_READ_FROM_CACHE_OP(false, 0, 1, 0, NULL, 0));
        
        static SPINAND_OP_VARIANTS(write_cache_variants,
                SPINAND_PROG_LOAD_X4(true, 0, 0, NULL, 0),
                SPINAND_PROG_LOAD(true, 0, 0, NULL, 0));
        
        static SPINAND_OP_VARIANTS(update_cache_variants,
                SPINAND_PROG_LOAD_X4(false, 0, 0, NULL, 0),
                SPINAND_PROG_LOAD(false, 0, 0, NULL, 0));
        
        /* FM25G02B OOB layout */
        static int fm25g02b_ooblayout_ecc(struct mtd_info *mtd, int section,
                                          struct mtd_oob_region *region)
        {
            if (section >= 8)
                return -ERANGE;
        
            region->offset = 64 + section * 8;
            region->length = 8;
        
            return 0;
        }
        
        static int fm25g02b_ooblayout_free(struct mtd_info *mtd, int section,
                                           struct mtd_oob_region *region)
        {
            if (section)
                return -ERANGE;
        
            region->offset = 2;
            region->length = 62;
        
            return 0;
        }
        
        static const struct mtd_ooblayout_ops fm25g02b_ooblayout = {
            .ecc = fm25g02b_ooblayout_ecc,
            .free = fm25g02b_ooblayout_free,
        };
        
        static const struct spinand_info fmsh_spinand_table[] = {
            SPINAND_INFO("FM25G02B",
                         SPINAND_ID(SPINAND_READID_METHOD_OPCODE_DUMMY, 0xD2),
                         NAND_MEMORG(1, 2048, 128, 64, 2048, 40, 1, 1, 1),
                         NAND_ECCREQ(40, 512),
                         SPINAND_INFO_OP_VARIANTS(&read_cache_variants,
                                                  &write_cache_variants,
                                                  &update_cache_variants),
                         SPINAND_HAS_QE_BIT,
                         SPINAND_ECCINFO(&fm25g02b_ooblayout, NULL)),
        };
        
        static const struct spinand_manufacturer_ops fmsh_spinand_manuf_ops = {
        };
        
        const struct spinand_manufacturer fmsh_spinand_manufacturer = {
            .id = SPINAND_MFR_FMSH,
            .name = "fmsh",
            .chips = fmsh_spinand_table,
            .nchips = ARRAY_SIZE(fmsh_spinand_table),
            .ops = &fmsh_spinand_manuf_ops,
        };
        EOF
        
        # 修改 Makefile
        if [ -f drivers/mtd/nand/spi/Makefile ]; then
            if ! grep -q "fmsh.o" drivers/mtd/nand/spi/Makefile; then
                sed -i 's/spinand-objs := core.o otp.o/spinand-objs := core.o fmsh.o otp.o/' drivers/mtd/nand/spi/Makefile
                echo "✅ Makefile 已修改"
            else
                echo "✅ Makefile 已包含 fmsh.o"
            fi
        fi
        
        # 修改 core.c
        if [ -f drivers/mtd/nand/spi/core.c ]; then
            if ! grep -q "fmsh_spinand_manufacturer" drivers/mtd/nand/spi/core.c; then
                sed -i '/&xtx_spinand_manufacturer,/a\	&fmsh_spinand_manufacturer,' drivers/mtd/nand/spi/core.c
                echo "✅ core.c 已修改"
            else
                echo "✅ core.c 已包含 fmsh_spinand_manufacturer"
            fi
        fi
        
        # 修改 spinand.h
        if [ -f include/linux/mtd/spinand.h ]; then
            if ! grep -q "fmsh_spinand_manufacturer" include/linux/mtd/spinand.h; then
                sed -i '/extern const struct spinand_manufacturer xtx_spinand_manufacturer;/a extern const struct spinand_manufacturer fmsh_spinand_manufacturer;' include/linux/mtd/spinand.h
                echo "✅ spinand.h 已修改"
            else
                echo "✅ spinand.h 已包含 fmsh_spinand_manufacturer"
            fi
        fi
        
        echo ""
        echo "=== 验证 fmsh.c ==="
        ls -la drivers/mtd/nand/spi/fmsh.c
        echo "=========================================="

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && cp -r files openwrt/
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Verify patches
      run: |
        cd openwrt
        echo "=========================================="
        echo "验证驱动状态"
        echo "=========================================="
        echo ""
        echo "=== 检查 fmsh.c 驱动 ==="
        if [ -f drivers/mtd/nand/spi/fmsh.c ]; then
          echo "✅ fmsh.c 驱动已存在"
          grep -q "FM25G02B" drivers/mtd/nand/spi/fmsh.c && echo "✅ FM25G02B 支持已添加"
        else
          echo "⚠️ 警告: fmsh.c 驱动未找到"
        fi
        echo ""
        echo "=== 检查设备补丁 (XG-040G-MD) ==="
        if grep -r "XG-040G" target/linux/ 2>/dev/null | head -3; then
          echo "✅ 设备补丁已找到"
        else
          echo "⚠️ 设备补丁状态未知"
        fi
        echo ""
        echo "=== 检查内核版本 ==="
        if [ -f include/kernel-version.mk ]; then
          grep "LINUX_VERSION" include/kernel-version.mk | head -3
        else
          echo "无法确定内核版本"
        fi
        echo "=========================================="

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        
    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=XG-040G-MD-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.2.1
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
