name: Build_XG_040G_MD

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: "OpenWRT.config"
  # REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default-main
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools python3-dev rsync swig unzip libpython3-dev \
          zlib1g-dev file wget squashfs-tools mkbootimg device-tree-compiler
          sudo apt update
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "❌ mkbootimg not found in PATH!"
          fi

          if [[ -n "$TZ" ]]; then
            sudo timedatectl set-timezone "$TZ"
          else
            echo "TZ is not set, skipping timezone setup."
          fi

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone OpenWrt source code and apply XG-040G-MD patch files
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt
          # 解压 XG-040G-MD.tar.gz 到 openwrt 目录（包含设备树、files等）
          tar -xzf $GITHUB_WORKSPACE/XG-040G-MD.tar.gz -C openwrt/
          # 进入补丁目录（仓库根目录下的 patches-6.12-openwrt）
          cd patches-6.12-openwrt
          # 仅复制复旦微闪存补丁到内核补丁目录（pending-6.12）
          # 补丁作用：添加复旦微 FM25G02B SPI NAND 芯片支持
          [ -e 499-mtd-spinand-FudanMicro-FM25G02B.patch ] && cp -f 499-mtd-spinand-FudanMicro-FM25G02B.patch ../openwrt/target/linux/generic/pending-6.12/
          # 注意：原 airoha 相关文件及 342 补丁的复制已全部删除

      # ========== 新增 diy-part1.sh ==========
      - name: Run diy-part1.sh
        run: |
          if [ -f "$GITHUB_WORKSPACE/diy-part1.sh" ]; then
            chmod +x "$GITHUB_WORKSPACE/diy-part1.sh"
            cd openwrt
            "$GITHUB_WORKSPACE/diy-part1.sh"
          else
            echo "⚠️ diy-part1.sh not found, skipping"
          fi

      - name: Update & Install feeds
        working-directory: ./openwrt
        run: |
          if [ -e ../$FEEDS_CONF ]; then
            cp -f ../$FEEDS_CONF ./feeds.conf.default
          fi
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      - name: Copy configuration and defconfig
        run: |
          cp -fv "${CONFIG_FILE}" openwrt/.config
          cd openwrt && make defconfig
          [ -e .config ] && cp .config defconfig-final.config

      # ========== 新增 diy-part2.sh ==========
      - name: Run diy-part2.sh
        run: |
          if [ -f "$GITHUB_WORKSPACE/diy-part2.sh" ]; then
            chmod +x "$GITHUB_WORKSPACE/diy-part2.sh"
            cd openwrt
            "$GITHUB_WORKSPACE/diy-part2.sh"
            # 如果 diy-part2.sh 修改了 .config，重新生成配置
            make defconfig
          else
            echo "⚠️ diy-part2.sh not found, skipping"
          fi

      - name: Upload build config files
        uses: actions/upload-artifact@v6
        with:
          name: build-config
          path: |
            OpenWRT.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j4 V=s
          # Remove small incomplete files <1KB
          find dl -size -1024c -delete

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s
          else
            make -j$(nproc)
          fi
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          if [[ -n "$DEVICE_NAME" ]]; then
            echo "DEVICE_NAME=_${DEVICE_NAME}" >> $GITHUB_ENV
          fi
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Prepare firmware artifacts path
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🚀 OpenWrt firmware for XG-040G-MD
          ----------------------
          设备型号: XG-040G-MD
          构建时间: $(date +"%Y-%m-%d %H:%M")
          内核版本: 6.12 (with FM25G02B SPI NAND patch)
          源码仓库: $REPO_URL
          分支: $REPO_BRANCH
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: |
            ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}好 现在 详细解读这个文件
