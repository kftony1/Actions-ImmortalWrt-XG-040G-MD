name: Build OpenWrt for XG-040G-MD

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: main
  CONFIG_FILE: openwrt.config

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools python3-dev rsync swig unzip zlib1g-dev file wget \
          squashfs-tools device-tree-compiler
        sudo timedatectl set-timezone Asia/Shanghai

    - name: Clone OpenWrt source
      run: |
        git clone --depth 1 --branch ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt
        cd openwrt
        # 解压设备补丁包（如果存在）
        [ -f ${{ github.workspace }}/XG-040G-MD.tar.gz ] && tar -xzf ${{ github.workspace }}/XG-040G-MD.tar.gz

    - name: Apply configuration
      run: |
        cd openwrt
        cp ${{ github.workspace }}/${{ env.CONFIG_FILE }} .config
        make defconfig

    - name: Download packages
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -delete

    - name: Build firmware
      id: build
      run: |
        cd openwrt
        make -j$(nproc)
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      if: steps.build.outputs.status == 'success'
      with:
        name: OpenWrt_firmware
        path: openwrt/bin/targets/*/*
