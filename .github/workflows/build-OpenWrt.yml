name: Build OpenWrt for XG-040G-MD

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: main
  CONFIG_FILE: openwrt.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools python3-dev rsync swig unzip zlib1g-dev file wget \
          squashfs-tools device-tree-compiler

    - name: Clone OpenWrt
      run: |
        git clone --depth 1 --branch ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt

    - name: Apply XG-040G-MD patches
      run: |
        cd openwrt
        tar -xzf ${{ github.workspace }}/XG-040G-MD.tar.gz --overwrite
        echo "=== 设备树检查 ==="
        ls -la target/linux/airoha/dts/an7581-bell_xg-040g-md.dts || echo "设备树不存在"
        echo "=== 补丁文件检查 ==="
        ls target/linux/airoha/patches-6.12/ | wc -l

    - name: Run diy-part1.sh
      run: |
        cd openwrt
        chmod +x ${{ github.workspace }}/${{ env.DIY_P1_SH }}
        ${{ github.workspace }}/${{ env.DIY_P1_SH }}

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Copy configuration
      run: |
        cd openwrt
        cp ${{ github.workspace }}/${{ env.CONFIG_FILE }} .config

    - name: Run diy-part2.sh
      run: |
        cd openwrt
        chmod +x ${{ github.workspace }}/${{ env.DIY_P2_SH }}
        ${{ github.workspace }}/${{ env.DIY_P2_SH }}

    - name: Configure
      run: |
        cd openwrt
        make defconfig
        echo "=== 设备配置验证 ==="
        grep "CONFIG_TARGET_airoha_an7581_DEVICE" .config

    - name: Download
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -delete

    - name: Build
      id: build
      run: |
        cd openwrt
        make -j$(nproc)
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Check firmware
      run: |
        cd openwrt/bin/targets/airoha/an7581
        echo "=== 固件列表 ==="
        ls -lh
        echo "=== 固件大小 ==="
        du -sh openwrt-*-sysupgrade.bin 2>/dev/null || echo "未找到 sysupgrade"

    - name: Upload
      uses: actions/upload-artifact@v4
      if: steps.build.outputs.status == 'success'
      with:
        name: OpenWrt_firmware
        path: openwrt/bin/targets/*/*
