name: Build Official OpenWrt for XG-040G-MD

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs (V=s)"
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: "openwrt.config"
  FEEDS_CONF: "feeds.conf.default"
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: main
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  KEEP_RELEASES: 20
  KEEP_RELEASE_MARKER: "[keep-release]"
  CCACHE_DIR: /mnt/openwrt/ccache
  CCACHE_MAXSIZE: 5G
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: myrepo

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: Setup environment dependencies
        run: |
          sudo apt update
          sudo apt purge -y python3-distutils || true
          sudo apt autoremove -y
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            mkbootimg device-tree-compiler ccache
          python3 -m pip install --upgrade pip setuptools wheel

      - name: Clone official OpenWrt (main branch, kernel 6.12)
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Clone xiangtailiang/openwrt for airoha platform patches
        run: |
          git clone --depth 1 https://github.com/xiangtailiang/openwrt.git xiang-repo
          cp -rf xiang-repo/target/linux/airoha openwrt/target/linux/

      - name: Extract your custom overlay (XG-040G-MD.tar.gz)
        run: |
          if [ -f "myrepo/XG-040G-MD.tar.gz" ]; then
            tar -xzf myrepo/XG-040G-MD.tar.gz -C openwrt/
          else
            echo "⚠️ XG-040G-MD.tar.gz not found"
          fi

      - name: Copy custom feeds.conf.default
        run: |
          if [ -f "myrepo/feeds.conf.default" ]; then
            cp myrepo/feeds.conf.default openwrt/feeds.conf.default
            echo "✅ Custom feeds.conf.default copied"
          else
            echo "⚠️ Using default feeds.conf from openwrt"
          fi

      - name: Move build dirs to /mnt/openwrt
        run: |
          sudo mkdir -p /mnt/openwrt/{dl,staging_dir,build_dir,ccache}
          sudo chown -R "$USER:$(id -gn)" /mnt/openwrt
          rm -rf openwrt/dl openwrt/staging_dir openwrt/build_dir
          ln -sfn /mnt/openwrt/dl openwrt/dl
          ln -sfn /mnt/openwrt/staging_dir openwrt/staging_dir
          ln -sfn /mnt/openwrt/build_dir openwrt/build_dir

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: /mnt/openwrt/dl
          key: ${{ runner.os }}-openwrt-official-dl-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-official-dl-

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-official-ccache-${{ hashFiles('myrepo/openwrt.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-official-ccache-

      - name: Setup ccache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -s

      - name: Copy custom .config and update feeds
        run: |
          cp myrepo/openwrt.config openwrt/.config
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f
          make defconfig

      - name: Download all source packages
        working-directory: ./openwrt
        run: |
          make download -j8
          find dl -size -1024c -delete

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s
          else
            make -j$(nproc)
          fi
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/' || true)
          if [[ -n "$DEVICE_NAME" ]]; then
            echo "DEVICE_NAME=_${DEVICE_NAME}" >> $GITHUB_ENV
          fi
          echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          ccache -s || true

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-official-ccache-${{ hashFiles('myrepo/openwrt.config') }}

      - name: Prepare firmware artifacts path
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🚀 Official OpenWrt for XG-040G-MD
          ----------------------
          设备型号: XG-040G-MD
          构建时间: $(date +"%Y-%m-%d %H:%M")
          内核版本: 6.12 (main branch)
          源码仓库: openwrt/openwrt
          平台补丁: xiangtailiang/airoha
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: |
            ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old GitHub Releases
        if: env.UPLOAD_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_RELEASES: ${{ env.KEEP_RELEASES }}
          KEEP_RELEASE_MARKER: ${{ env.KEEP_RELEASE_MARKER }}
        run: bash myrepo/scripts/cleanup-old-releases.sh 2>/dev/null || true
