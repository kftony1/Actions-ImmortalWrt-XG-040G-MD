name: Build Official OpenWrt (Kernel 6.12) with xiangtailiang patches + FMSH driver

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: myrepo

      - name: Clone official OpenWrt (main branch, kernel 6.12)
        run: |
          git clone https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git checkout main

      - name: Clone xiangtailiang/openwrt for patches (target/linux/airoha)
        run: |
          git clone --depth 1 https://github.com/xiangtailiang/openwrt.git xiang-repo
          cp -rf xiang-repo/target/linux/airoha openwrt/target/linux/

      - name: Extract your custom overlay (XG-040G-MD.tar.gz)
        run: |
          cd openwrt
          tar -xzf ../myrepo/XG-040G-MD.tar.gz

      - name: Prepare kernel source
        run: |
          cd openwrt
          make target/linux/prepare
          # 查找内核源码目录（通常在 build_dir/target-*/linux-*）
          KERNEL_DIR=$(find build_dir/target-* -name "linux-*" -type d | head -1)
          if [ -z "$KERNEL_DIR" ]; then
            echo "ERROR: Kernel source directory not found!"
            exit 1
          fi
          echo "KERNEL_DIR=$KERNEL_DIR" >> $GITHUB_ENV
          echo "Kernel source prepared at $KERNEL_DIR"

      - name: Apply kernel patch for FudanMicro FM25G02B
        run: |
          cd "${{ env.KERNEL_DIR }}"
          if [ -z "$PWD" ]; then
            echo "ERROR: Kernel directory not set"
            exit 1
          fi
          echo "Working in kernel directory: $PWD"
          
          # 配置 git 用户信息（内核目录是一个 git 仓库）
          git config user.email "runner@openwrt.org"
          git config user.name "OpenWrt Runner"
          
          PATCH_FILE="${{ github.workspace }}/myrepo/patches/0400-full-fmsh-driver-with-fm25g02b-fix.patch"
          if [ ! -f "$PATCH_FILE" ]; then
            echo "ERROR: Patch file not found at $PATCH_FILE"
            exit 1
          fi
          
          if [ -f drivers/mtd/nand/spi/fmsh.c ]; then
            echo "fmsh.c already exists, skipping patch"
          else
            echo "Applying FMSH driver patch"
            # 尝试 git am
            if git am --whitespace=fix < "$PATCH_FILE"; then
              echo "git am succeeded"
            else
              echo "git am failed, trying patch -p1"
              patch -p1 < "$PATCH_FILE"
              if [ $? -ne 0 ]; then
                echo "ERROR: Failed to apply patch"
                exit 1
              fi
              git add drivers/mtd/nand/spi/
              git commit -m "Apply FMSH driver patch via patch command"
            fi
          fi

      - name: Verify FMSH driver patch applied
        run: |
          cd "${{ env.KERNEL_DIR }}"
          if grep -q "fmsh_spinand_manufacturer" drivers/mtd/nand/spi/core.c; then
            echo "✅ FMSH driver successfully integrated"
          else
            echo "❌ FMSH driver NOT found in core.c"
            exit 1
          fi

      - name: Use your openwrt.config
        run: |
          cp myrepo/openwrt.config openwrt/.config

      - name: Update feeds and defconfig
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig

      - name: Download all source packages
        run: |
          cd openwrt
          make download -j8

      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc)

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-6.12-xg-040g-md
          path: openwrt/bin/targets/airoha/an7581/
