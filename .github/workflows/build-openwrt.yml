name: Build immortalwrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: 0 8 * * 1

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: immortalwrt.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        dpkg-query -Wf '${Installed-Size}\t${Package}\n' | sort -n | tail -n 100
        df -h
        echo "Removing large packages"
        sudo apt-get remove -y '^dotnet-.*'
        sudo apt-get remove -y '^llvm-.*'
        sudo apt-get remove -y 'php.*'
        sudo apt-get remove -y '^mongodb-.*'
        sudo apt-get remove -y '^mysql-.*'
        sudo apt-get remove -y azure-cli google-cloud-sdk google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri
        sudo apt-get autoremove -y
        sudo apt-get clean
        df -h
        echo "Removing large directories"
        sudo rm -rf /usr/share/dotnet/
        sudo rm -rf /usr/local/graalvm/
        sudo rm -rf /usr/local/.ghcup/
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/local/lib/node_modules
        df -h
        sudo -E apt-get -qq update
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp \
          nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip python3-ply \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig \
          texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        # 解压设备补丁包（如果存在）
        if [ -f $GITHUB_WORKSPACE/XG-040G-MD.tar.gz ]; then
          echo "Extracting device patch..."
          tar zxvf $GITHUB_WORKSPACE/XG-040G-MD.tar.gz -C /workdir/openwrt
        else
          echo "Warning: XG-040G-MD.tar.gz not found, skipping"
        fi

    - name: Enable build ccache
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: 'immortalwrt-xg040gmd-612'
        prefix: /workdir/openwrt

    - name: Load custom feeds
      run: |
        cd /workdir/openwrt
        if [ -f $GITHUB_WORKSPACE/$FEEDS_CONF ]; then
          cp $GITHUB_WORKSPACE/$FEEDS_CONF feeds.conf.default
        fi
        if [ -f $GITHUB_WORKSPACE/$DIY_P1_SH ]; then
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH
        else
          echo "Warning: $DIY_P1_SH not found, skipping"
        fi
   
    - name: Update feeds
      run: cd /workdir/openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd /workdir/openwrt && ./scripts/feeds install -a

    # ============================================
    # 关键修复：配置加载 + defconfig 立即执行
    # ============================================
    - name: Load custom configuration
      run: |
        cd /workdir/openwrt
        
        # 1. 复制内核配置文件
        if [ -f $GITHUB_WORKSPACE/$CONFIG_FILE ]; then
          cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
          echo "✓ Config file copied successfully"
        else
          echo "⚠ Warning: $CONFIG_FILE not found, using default config"
        fi
        
        # 2. 执行编译后自定义脚本（添加额外配置）
        if [ -f $GITHUB_WORKSPACE/$DIY_P2_SH ]; then
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH
          echo "✓ DIY_P2_SH executed"
        else
          echo "⚠ Warning: $DIY_P2_SH not found, skipping"
        fi
        
        # 3. 🔥 关键修复：立即运行 defconfig 固化配置
        make defconfig
        echo "✓ defconfig completed - configuration frozen"
        
        # 4. 保存最终配置用于调试
        cp .config defconfig-final.config
        echo "✓ Final config saved to defconfig-final.config"
        
        # 5. 验证关键驱动是否启用
        echo ""
        echo "=== 关键驱动验证 ==="
        for driver in kmod-airoha-eth kmod-airoha-switch kmod-airoha-npu; do
          if grep -q "CONFIG_PACKAGE_$driver=y" .config; then
            echo "  ✅ $driver"
          else
            echo "  ❌ $driver (MISSING!)"
          fi
        done

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    # ============================================
    # 注意：这里不再执行 make defconfig
    # ============================================
    - name: Download package
      id: package
      run: |
        cd /workdir/openwrt
        # make defconfig  # 🔥 已删除！在上一步已经执行过了
        make download -j8
        # 删除下载失败的小文件（小于1KB）
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd /workdir/openwrt
        echo -e "$(nproc) thread compile"
        if make -j$(nproc); then
          echo "status=success" >> $GITHUB_OUTPUT
        elif make -j1; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          make -j1 V=s
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi
        # 提取设备名称
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        if [ -s DEVICE_NAME ]; then
          DEVICE_NAME=$(cat DEVICE_NAME)
          echo "DEVICE_NAME=_$DEVICE_NAME" >> $GITHUB_ENV
          echo "✓ Device: $DEVICE_NAME"
        else
          echo "⚠ Warning: No device name found in config"
          echo "DEVICE_NAME=" >> $GITHUB_ENV
        fi
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M%S")" >> $GITHUB_ENV
        
    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: /workdir/openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && steps.compile.outputs.status == 'success'
      run: |
        cd /workdir/openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        echo "✓ Firmware directory: $PWD"

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success'
      run: |
        RELEASE_TAG="XG-040G-MD-$(date +"%Y.%m.%d-%H%M%S")"
        echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
        echo "Release tag: $RELEASE_TAG" > release.txt
        echo "Build date: $(date)" >> release.txt
        echo "Device: XG-040G-MD" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.2.1
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
